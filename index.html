<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocab — Marko</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap');
  :root {
    --ink: #1a1a2e; --fog: #e8e4dc; --paper: #f5f2eb;
    --sea: #2d6a8a; --accent: #c94a2b; --muted: #8a8070; --green: #2a7a4b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  header { width: 100%; max-width: 560px; display: flex; justify-content: space-between;
    align-items: baseline; margin-bottom: 2rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; }
  header span { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); }
  .progress-track { width: 100%; max-width: 560px; height: 3px; background: var(--fog);
    border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--sea); border-radius: 2px; transition: width 0.4s ease; }
  .stats { width: 100%; max-width: 560px; display: flex; gap: 1rem; margin-bottom: 0.5rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); flex-wrap: wrap; }
  .stats .pill { cursor: pointer; padding: 0.3rem 0.7rem; border-radius: 20px;
    border: 1px solid var(--fog); background: white; transition: background 0.15s; }
  .stats .pill:hover { background: var(--fog); }
  .pill-new .val { color: var(--muted); }
  .pill-wip .val { color: #b07a1a; }
  .pill-done .val { color: var(--green); }
  .pill-again .val { color: var(--accent); }
  .panel { display: none; width: 100%; max-width: 560px; background: white; border-radius: 4px;
    padding: 0.9rem 1.2rem; margin-bottom: 0.8rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .panel-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
  .panel-list { font-size: 0.82rem; line-height: 1.9; color: var(--ink); }
  .card-wrap { width: 100%; max-width: 560px; margin-bottom: 1.5rem; margin-top: 0.8rem; }
  .card { width: 100%; min-height: 220px; background: white; border-radius: 4px;
    box-shadow: 0 2px 0 #ccc4b8, 0 4px 20px rgba(0,0,0,0.07); padding: 2.5rem 2rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; cursor: pointer; transition: transform 0.15s ease; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--sea); }
  .card:active { transform: translateY(1px); }
  .word { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 700;
    color: var(--ink); margin-bottom: 0.5rem; line-height: 1.2; }
  .type-hint { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.5rem; }
  .tap-hint { font-size: 0.8rem; color: var(--muted); font-style: italic; margin-top: 1rem; }
  .translation { display: none; flex-direction: column; align-items: center; gap: 0.5rem;
    margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--fog); width: 100%; }
  .translation.show { display: flex; }
  .trans-text { font-size: 1.2rem; color: var(--sea); font-weight: 500; }
  .example { font-size: 0.85rem; color: var(--muted); font-style: italic; max-width: 380px; line-height: 1.5; }
  .buttons { width: 100%; max-width: 560px; display: flex; gap: 0.6rem; }
  .btn { flex: 1; padding: 0.8rem 0.5rem; border: none; border-radius: 4px; font-family: 'Inter', sans-serif;
    font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all 0.15s ease;
    display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
  .btn small { font-size: 0.6rem; font-weight: 400; opacity: 0.7; font-family: 'IBM Plex Mono', monospace; }
  .btn-again { background: #fef0ed; color: var(--accent); border: 1.5px solid #f5c4bc; }
  .btn-hard  { background: #fff8ec; color: #b07a1a; border: 1.5px solid #f0d9a0; }
  .btn-good  { background: #edf6f1; color: var(--green); border: 1.5px solid #b5dcca; }
  .btn-easy  { background: #e8f2f8; color: var(--sea); border: 1.5px solid #a8cce0; }
  .btn:active { transform: translateY(1px); }
  .hidden { display: none !important; }
  .done { display: none; flex-direction: column; align-items: center; text-align: center;
    gap: 0.9rem; padding: 2.5rem 2rem; background: white; border-radius: 4px;
    box-shadow: 0 2px 0 #ccc4b8; width: 100%; max-width: 560px; }
  .done.show { display: flex; }
  .done-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--ink); }
  .done-stats { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: var(--muted); line-height: 1.9; white-space: pre-line; }
  .btn-main { padding: 0.8rem 2rem; background: var(--ink); color: white; border: none;
    border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.9rem; cursor: pointer; }
  .btn-main:hover { background: var(--sea); }
  .btn-secondary { padding: 0.6rem 1.5rem; background: transparent; color: var(--muted);
    border: 1px solid var(--fog); border-radius: 4px; font-family: 'Inter', sans-serif;
    font-size: 0.78rem; cursor: pointer; }
  .version { position: fixed; bottom: 8px; right: 10px; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; color: #ccc; pointer-events: none; }
</style>
</head>
<body>

<header>
  <h1>Vocab · B2→C1</h1>
  <span id="counter">— / 40</span>
</header>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="stats">
  <div class="pill pill-new" onclick="togglePanel('pNew')">○ <span class="val" id="statNew">40</span> nouveaux</div>
  <div class="pill pill-wip" onclick="togglePanel('pWip')">◑ <span class="val" id="statWip">0</span> en cours</div>
  <div class="pill pill-done" onclick="togglePanel('pDone')">● <span class="val" id="statDone">0</span> acquis</div>
  <div class="pill pill-again" onclick="togglePanel('pAgain')">↩ <span class="val" id="statAgain">0</span> ratés</div>
</div>

<div class="panel" id="pNew">
  <div class="panel-title">Nouveaux — jamais vus</div>
  <div class="panel-list" id="listNew">—</div>
</div>
<div class="panel" id="pWip">
  <div class="panel-title">En cours — mémoire de travail (&lt;7j)</div>
  <div class="panel-list" id="listWip">—</div>
</div>
<div class="panel" id="pDone">
  <div class="panel-title">Acquis — mémoire long terme (≥7j)</div>
  <div class="panel-list" id="listDone">—</div>
</div>
<div class="panel" id="pAgain">
  <div class="panel-title">Ratés cette session</div>
  <div class="panel-list" id="listAgain">—</div>
</div>

<div class="card-wrap">
  <div class="card" id="card" onclick="revealCard()">
    <div class="type-hint" id="typeHint">—</div>
    <div class="word" id="wordDisplay">—</div>
    <div class="tap-hint" id="tapHint">toucher pour révéler</div>
    <div class="translation" id="translation">
      <div class="trans-text" id="transText">—</div>
      <div class="example" id="exampleText"></div>
    </div>
  </div>
</div>

<div class="buttons hidden" id="buttons">
  <button class="btn btn-again" onclick="answer(1)">Raté<small>revoir bientôt</small></button>
  <button class="btn btn-hard"  onclick="answer(2)">Difficile<small>+1 j</small></button>
  <button class="btn btn-good"  onclick="answer(3)">Bien<small>+3 j</small></button>
  <button class="btn btn-easy"  onclick="answer(4)">Facile<small>+7 j</small></button>
</div>

<div class="done" id="done">
  <div class="done-title">Session terminée 🎯</div>
  <div class="done-stats" id="doneStats"></div>
  <button class="btn-main" onclick="init()">Continuer</button>
  <button class="btn-secondary" onclick="confirmReset()">↺ Tout réinitialiser</button>
</div>

<div class="version">v4</div>

<script>
// ── Vocabulaire ───────────────────────────────────────────
const VOCAB = [
  { word: "to squander",           type: "verbe",      fr: "gaspiller",                          ex: "Don't squander this opportunity." },
  { word: "mischief",              type: "nom",        fr: "espièglerie / bêtise",               ex: "The kids were up to mischief again." },
  { word: "making out",            type: "expression", fr: "rouler des pelles",                  ex: "They were making out in the back of the car." },
  { word: "scrumptious",           type: "adjectif",   fr: "succulent, délicieux",               ex: "That cake looks absolutely scrumptious." },
  { word: "to fuss",               type: "verbe",      fr: "faire des histoires / s'agiter",     ex: "Stop fussing — it'll be fine." },
  { word: "make no fuss",          type: "expression", fr: "ne pas faire d'histoires",           ex: "She made no fuss about the delay." },
  { word: "clerk",                 type: "nom",        fr: "employé de bureau / commis",         ex: "A desk clerk handed him the key." },
  { word: "to pinch",              type: "verbe",      fr: "pincer / piquer (voler)",            ex: "Someone pinched my wallet on the metro." },
  { word: "to warrant",            type: "verbe",      fr: "justifier / mériter",                ex: "The situation warrants immediate action." },
  { word: "warrant",               type: "nom",        fr: "mandat (juridique)",                 ex: "Police obtained a search warrant." },
  { word: "to indict",             type: "verbe",      fr: "inculper / mettre en examen",        ex: "He was indicted on charges of fraud." },
  { word: "brass",                 type: "nom",        fr: "laiton / cuivre / les gradés",       ex: "The handles were polished brass." },
  { word: "precincts",             type: "nom",        fr: "circonscriptions / commissariat",    ex: "The 12th precinct handled the case." },
  { word: "noteworthy",            type: "adjectif",   fr: "remarquable / digne d'attention",    ex: "Her performance was noteworthy." },
  { word: "clutter",               type: "nom",        fr: "désordre / bric-à-brac",             ex: "Clear the clutter from your desk." },
  { word: "cluttered",             type: "adjectif",   fr: "encombré",                           ex: "The office was hopelessly cluttered." },
  { word: "pawnshop",              type: "nom",        fr: "prêteur sur gage",                   ex: "He sold his watch at a pawnshop." },
  { word: "to sprawl",             type: "verbe",      fr: "s'étaler / s'affaler",               ex: "She sprawled across the sofa." },
  { word: "tenement",              type: "nom",        fr: "immeuble vétuste / taudis",          ex: "Tenements lined the old neighbourhood." },
  { word: "tenet",                 type: "nom",        fr: "principe / doctrine",                ex: "A core tenet of the philosophy." },
  { word: "to put a tail on",      type: "expression", fr: "filer quelqu'un",                    ex: "They put a tail on the suspect." },
  { word: "to tip off",            type: "verbe",      fr: "prévenir / donner un tuyau",         ex: "An informant tipped off the police." },
  { word: "to assume",             type: "verbe",      fr: "supposer (≠ assumer !)",             ex: "Don't assume he already knows." },
  { word: "take on / undertake",   type: "verbe",      fr: "assumer (vraie traduction)",         ex: "She took on full responsibility." },
  { word: "wooden",                type: "adjectif",   fr: "en bois / rigide (jeu d'acteur)",    ex: "A wooden floor. / A wooden performance." },
  { word: "tweezers",              type: "nom",        fr: "pince à épiler",                     ex: "Use tweezers to remove the splinter." },
  { word: "to wince",              type: "verbe",      fr: "grimacer / tressaillir",             ex: "She winced when she saw the bill." },
  { word: "to raise awareness",    type: "expression", fr: "sensibiliser (quelqu'un à)",         ex: "The campaign raised awareness among young voters." },
  { word: "every other year",      type: "expression", fr: "une année sur deux",                 ex: "The conference is held every other year." },
  { word: "to haggle (over)",      type: "verbe",      fr: "marchander / négocier le prix",      ex: "He haggled over the price for 20 minutes." },
  { word: "to write on the fly",   type: "expression", fr: "écrire au fil de l'eau",             ex: "I'm writing this on the fly." },
  { word: "meager",                type: "adjectif",   fr: "maigre / insuffisant",               ex: "A meager salary for such hard work." },
  { word: "to mull over",          type: "verbe",      fr: "réfléchir à / peser le pour et contre", ex: "She mulled it over before deciding." },
  { word: "bladder",               type: "nom",        fr: "vessie",                             ex: "A full bladder after three coffees." },
  { word: "to perk up",            type: "verbe",      fr: "se ragaillardir / s'améliorer",      ex: "She perked up when she heard the news." },
  { word: "bleak",                 type: "adjectif",   fr: "morne / sombre / sans espoir",       ex: "A bleak landscape. A bleak outlook." },
  { word: "shambles",              type: "nom",        fr: "désordre total / pagaille",          ex: "The event was a complete shambles." },
  { word: "to hold up",            type: "verbe",      fr: "retenir / bloquer / braquer",        ex: "What's holding up the traffic?" },
  { word: "hamstrung",             type: "adjectif",   fr: "entravé / paralysé",                 ex: "Hamstrung by lack of funding." },
  { word: "whanging on",           type: "expression", fr: "s'acharner / ne pas lâcher l'affaire", ex: "He kept whanging on about the same point." },
];

// ── localStorage ─────────────────────────────────────────
const KEY = 'vocab_marko_v4';

function save() {
  try {
    const snap = {};
    cards.forEach(c => {
      snap[c.id] = { interval: c.interval, nextReview: c.nextReview, reps: c.reps, ef: c.ef };
    });
    localStorage.setItem(KEY, JSON.stringify(snap));
  } catch(e) { console.warn('save failed', e); }
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function confirmReset() {
  if (confirm('Effacer toute la progression ?')) {
    localStorage.removeItem(KEY);
    location.reload();
  }
}

// ── Cartes ───────────────────────────────────────────────
const saved = loadSaved();
const cards = VOCAB.map((v, i) => ({
  ...v,
  id: i,
  interval:   Number(saved[i]?.interval   ?? 0),
  nextReview: Number(saved[i]?.nextReview ?? 0),
  reps:       Number(saved[i]?.reps       ?? 0),
  ef:         Number(saved[i]?.ef         ?? 2.5),
}));

// ── Catégories cognitives ────────────────────────────────
// Nouveau  : interval = 0 (jamais vu ou remis à zéro)
// En cours : 0 < interval < 7  (mémoire de travail)
// Acquis   : interval >= 7 (mémoire long terme)
function getCategory(card) {
  if (card.interval === 0) return 'new';
  if (card.interval < 7)   return 'wip';
  return 'done';
}

// ── SM-2 ─────────────────────────────────────────────────
function sm2(card, q) {
  let { interval, reps, ef } = card;
  if (q === 1) {
    interval = 0; reps = 0;
  } else {
    reps++;
    if (reps === 1)      interval = 1;
    else if (reps === 2) interval = (q === 4) ? 4 : 3;
    else                 interval = Math.round(interval * ef);
    if (q === 4)         interval = Math.round(interval * 1.3);
    ef = Math.max(1.3, ef + 0.1 - (4 - q) * 0.08);
  }
  return { interval, reps, ef, nextReview: Date.now() + interval * 86400000 };
}

// ── Shuffle ───────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── État ─────────────────────────────────────────────────
let queue = [];
let sessionTotal = 0;
let sessionAgain = [];   // mots ratés cette session
let revealed = false;
let current = null;

// ── Init ─────────────────────────────────────────────────
function init() {
  const due = cards.filter(c => c.nextReview <= Date.now());
  queue = shuffle(due);
  sessionTotal = queue.length;
  sessionAgain = [];

  document.getElementById('done').classList.remove('show');
  document.getElementById('card').style.display = 'flex';
  document.getElementById('buttons').classList.add('hidden');

  updateGlobalStats();

  if (queue.length === 0) {
    showNothingDue();
  } else {
    showCard();
  }
}

// ── Affichage carte ───────────────────────────────────────
function showCard() {
  if (queue.length === 0) { endSession(); return; }
  current = queue[0];
  revealed = false;

  document.getElementById('wordDisplay').textContent = current.word;
  document.getElementById('typeHint').textContent = current.type;
  document.getElementById('transText').textContent = current.fr;
  document.getElementById('exampleText').textContent = current.ex || '';
  document.getElementById('translation').classList.remove('show');
  document.getElementById('tapHint').classList.remove('hidden');
  document.getElementById('buttons').classList.add('hidden');
  document.getElementById('card').style.cursor = 'pointer';

  const done = sessionTotal - queue.filter((c,i,a) => a.indexOf(c) === 0 || true).length;
  const progress = sessionTotal > 0 ? (sessionTotal - queue.length) / sessionTotal : 0;
  document.getElementById('counter').textContent = `${sessionTotal - queue.length + 1} / ${sessionTotal}`;
  document.getElementById('progressFill').style.width = `${progress * 100}%`;
}

function revealCard() {
  if (revealed) return;
  revealed = true;
  document.getElementById('translation').classList.add('show');
  document.getElementById('tapHint').classList.add('hidden');
  document.getElementById('buttons').classList.remove('hidden');
  document.getElementById('card').style.cursor = 'default';
}

// ── Réponse ───────────────────────────────────────────────
function answer(q) {
  queue.shift();
  const updated = sm2(current, q);
  Object.assign(current, updated);
  save();

  if (q === 1) {
    queue.splice(Math.min(5, queue.length), 0, current);
    if (!sessionAgain.includes(current.word)) sessionAgain.push(current.word);
  }

  updateGlobalStats();
  showCard();
}

// ── Stats globales (persistées) ───────────────────────────
function updateGlobalStats() {
  const newCards  = cards.filter(c => getCategory(c) === 'new');
  const wipCards  = cards.filter(c => getCategory(c) === 'wip');
  const doneCards = cards.filter(c => getCategory(c) === 'done');

  document.getElementById('statNew').textContent   = newCards.length;
  document.getElementById('statWip').textContent   = wipCards.length;
  document.getElementById('statDone').textContent  = doneCards.length;
  document.getElementById('statAgain').textContent = sessionAgain.length;

  setList('listNew',   newCards.map(c => c.word),   '○');
  setList('listWip',   wipCards.map(c => c.word),   '◑');
  setList('listDone',  doneCards.map(c => c.word),  '●');
  setList('listAgain', sessionAgain,                 '↩');
}

function setList(id, words, icon) {
  const el = document.getElementById(id);
  if (!words.length) { el.innerHTML = '—'; return; }
  el.innerHTML = words.map(w => `<span style="opacity:0.5">${icon}</span> ${w}`).join('<br>');
}

function togglePanel(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// ── Rien à réviser ────────────────────────────────────────
function showNothingDue() {
  const next = cards.filter(c => c.nextReview > Date.now()).sort((a,b) => a.nextReview - b.nextReview)[0];
  const hours = next ? Math.ceil((next.nextReview - Date.now()) / 3600000) : '?';
  document.getElementById('card').innerHTML = `
    <div class="type-hint">à jour ✓</div>
    <div class="word" style="font-size:1.3rem">Rien à réviser 🎉</div>
    <div class="tap-hint" style="display:block;margin-top:1rem">Prochain mot dans ~${hours}h</div>
  `;
  document.getElementById('buttons').classList.add('hidden');
  document.getElementById('counter').textContent = '0 / 0';
}

// ── Fin de session ────────────────────────────────────────
function endSession() {
  document.getElementById('card').style.display = 'none';
  document.getElementById('buttons').classList.add('hidden');
  document.getElementById('progressFill').style.width = '100%';

  const doneCount = cards.filter(c => getCategory(c) === 'done').length;
  const wipCount  = cards.filter(c => getCategory(c) === 'wip').length;
  const next = cards.filter(c => c.nextReview > Date.now()).sort((a,b) => a.nextReview - b.nextReview)[0];
  const nextInfo = next ? `Prochain mot dans ~${Math.ceil((next.nextReview - Date.now()) / 3600000)}h` : '';

  document.getElementById('doneStats').textContent =
    `● ${doneCount} acquis · ◑ ${wipCount} en cours\n↩ ${sessionAgain.length} raté(s) cette session\n\n${nextInfo}`;
  document.getElementById('done').classList.add('show');
}

// ── Démarrage ─────────────────────────────────────────────
init();
</script>
</body>
</html>
